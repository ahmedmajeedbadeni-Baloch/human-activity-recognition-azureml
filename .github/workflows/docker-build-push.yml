name: Build and push inference container

# Builds Dockerfile and pushes it to Docker Hub whenever the Dockerfile,
# score.py, or requirements change on main. Written fresh in this pass and
# not yet run against a real Docker Hub account.
#
# Required setup before this will work:
#   1. A Docker Hub account and repository named human-activity-recognition
#      (or update DOCKERHUB_REPO below to match whatever name you use).
#   2. Two repository secrets:
#      - DOCKERHUB_USERNAME: your Docker Hub username
#      - DOCKERHUB_TOKEN: a Docker Hub access token (Account Settings ->
#        Security -> New Access Token), not your account password.

on:
  push:
    branches: [ main ]
    paths:
      - "Dockerfile"
      - "src/training/score.py"
      - "requirements.txt"
  workflow_dispatch:

env:
  DOCKERHUB_REPO: human-activity-recognition

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ github.sha }}
